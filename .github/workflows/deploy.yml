name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest  #it is not my server . it indicates github provided temprory machine
  steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3 #it is like package
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd ~/vps-deployment
          git pull 
          docker compose down
          docker compose up -d --build